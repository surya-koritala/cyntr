version: '3.8'

services:
  cyntr:
    build: .
    ports:
      - "7700:7700"   # Dashboard
      - "8080:8080"   # API
      - "3000:3000"   # Slack webhook
    volumes:
      - cyntr-data:/data
      - ./cyntr.yaml:/app/cyntr.yaml:ro
      - ./policy.yaml:/app/policy.yaml:ro
    environment:
      # LLM Provider (uncomment one)
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
      # - AZURE_OPENAI_API_KEY=...
      # - AZURE_OPENAI_ENDPOINT=https://...
      # - AZURE_OPENAI_DEPLOYMENT=gpt-4o

      # Slack (optional)
      # - SLACK_BOT_TOKEN=xoxb-...
      # - SLACK_TENANT=default
      # - SLACK_AGENT=assistant

      # API Key
      # - CYNTR_API_KEY=cyntr_...

      # MCP Servers (optional)
      # - MCP_SERVERS=[{"name":"filesystem","command":"npx","args":["-y","@modelcontextprotocol/server-filesystem","/data"],"transport":"stdio"}]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7700/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cyntr-data:
